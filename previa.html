<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Central do Assinante - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone {
      width: 390px;
      height: 844px;
      background: #F5F6FA;
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Topo azul escuro */
    .header {
      background: linear-gradient(135deg, #1A2744, #2a3f6a);
      padding: 56px 24px 24px 24px;
      color: white;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
    }

    .header-info { flex: 1; }

    .header-info h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-info p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Card Verde - Fatura */
    .fatura-card {
      background: linear-gradient(135deg, #2E7D32, #43a047);
      border-radius: 20px;
      padding: 24px;
      color: white;
      box-shadow: 0 8px 20px rgba(46,125,50,0.3);
    }

    .fatura-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .fatura-header span {
      font-size: 14px;
      opacity: 0.9;
    }

    .fatura-mes {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .fatura-valor {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .fatura-vencimento {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .btn-pix {
      width: 100%;
      background: white;
      color: #2E7D32;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .btn-pix:active { transform: scale(0.98); }

    /* Card Conexao */
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    .conexao-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(76,175,80,0.4);
    }

    .status-dot.online { background: #4CAF50; }
    .status-dot.offline { background: #FFA726; }

    .status-label {
      font-size: 16px;
      font-weight: 600;
      color: #1A2744;
    }

    .status-badge {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-badge.online {
      background: rgba(76,175,80,0.1);
      color: #4CAF50;
    }

    .info-row {
      display: flex;
      gap: 24px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .info-item svg { opacity: 0.5; }

    .info-item label {
      font-size: 11px;
      font-weight: 500;
      color: #6B7280;
    }

    .info-item span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1A2744;
    }

    /* Card Suporte */
    .suporte-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .suporte-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(26,39,68,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .suporte-text h3 {
      font-size: 16px;
      font-weight: 600;
      color: #1A2744;
    }

    .suporte-text p {
      font-size: 13px;
      color: #6B7280;
    }

    .btn-whatsapp {
      width: 100%;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-whatsapp:active { opacity: 0.9; }

    /* Bottom nav */
    .bottom-nav {
      display: flex;
      justify-content: space-around;
      padding: 12px 16px 24px;
      background: white;
      border-top: 1px solid #eee;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #6B7280;
      font-size: 11px;
      cursor: pointer;
    }

    .nav-item.active {
      color: #1A2744;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1A2744;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      height: 44px;
      background: #1A2744;
    }
  </style>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar"></div>

    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="avatar">J</div>
        <div class="header-info">
          <h2>Olá, João Silva</h2>
          <p>Provedor Exemplo Telecom</p>
        </div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Card Fatura -->
      <div class="fatura-card">
        <div class="fatura-header">
          <span>Fatura em Aberto</span>
          <span class="fatura-mes">Jun/2026</span>
        </div>
        <div class="fatura-valor">R$ 105,00</div>
        <div class="fatura-vencimento">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" opacity="0.8">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Vence em 09/07/2026
        </div>
        <button class="btn-pix" onclick="copiarPix()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copiar PIX
        </button>
      </div>

      <!-- Card Conexao -->
      <div class="card">
        <div class="conexao-status">
          <div class="status-dot online"></div>
          <span class="status-label">Online</span>
          <span class="status-badge online">Autenticado</span>
        </div>
        <div class="info-row">
          <div class="info-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2">
              <path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/>
              <path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1"/>
            </svg>
            <div>
              <label>PPPoE</label>
              <span>joao@exemplo</span>
            </div>
          </div>
          <div class="info-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            <div>
              <label>IP</label>
              <span>192.168.1.100</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Card Suporte -->
      <div class="card">
        <div class="suporte-header">
          <div class="suporte-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A2744" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
          </div>
          <div class="suporte-text">
            <h3>Precisa de Ajuda?</h3>
            <p>Fale com nosso suporte</p>
          </div>
        </div>
        <button class="btn-whatsapp">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          Falar no WhatsApp
        </button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Início</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        <span>Financeiro</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>Suporte</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span>Conta</span>
      </div>
    </div>
  </div>

  <script>
    function copiarPix() {
      alert('Chave PIX copiada para a área de transferência!');
    }
  </script>
</body>
</html>
